# Local dev infra for Cogni Board.
# Ports/credentials match backend/.env.example (DATABASE_URL / REDIS_URL).
# The app itself is not containerized here — it runs on the host via `make start`.

name: ada

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: ada
      POSTGRES_DB: ada
    ports:
      - "5433:5432"
    volumes:
      - ada_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ada_pg_data:
