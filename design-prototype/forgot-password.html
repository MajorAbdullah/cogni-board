<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Cogni Board</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    .forgot-layout {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-6);
      background: var(--bg-primary);
    }
    .forgot-card {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .forgot-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto var(--space-6);
      background: var(--accent-light);
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }
    .forgot-card h2 {
      font-size: var(--text-2xl);
      margin-bottom: var(--space-2);
    }
    .forgot-card .subtitle {
      color: var(--text-secondary);
      font-size: var(--text-sm);
      margin-bottom: var(--space-8);
    }
    .forgot-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
      text-align: left;
    }
    .forgot-form .btn-primary {
      width: 100%;
    }
    .forgot-footer {
      margin-top: var(--space-6);
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="forgot-layout">
    <div class="forgot-card">
      <div class="forgot-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>

      <h2>Reset your password</h2>
      <p class="subtitle">Enter your work email and we'll send a secure reset link.</p>

      <form class="forgot-form" onsubmit="return false;">
        <div class="input-group">
          <label class="input-label" for="email">Work email</label>
          <input class="input" type="email" id="email" placeholder="you@company.com" autocomplete="email">
        </div>

        <button type="submit" class="btn btn-primary btn-lg">
          Send reset link
        </button>
      </form>

      <div class="forgot-footer">
        Need help? <a href="#">Contact support</a>
      </div>
    </div>

    <!-- Dark mode toggle -->
    <button class="btn btn-ghost btn-icon" style="position: fixed; top: var(--space-4); right: var(--space-4);" onclick="toggleTheme()" data-tooltip="Toggle dark mode">
      <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
